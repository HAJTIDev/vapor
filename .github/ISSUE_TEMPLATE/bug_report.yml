name: Bug report
description: Report a reproducible bug in Vapor
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue and what you expected.
      placeholder: The game list does not load after startup...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce it.
      placeholder: |
        1. Open Vapor
        2. Go to Settings
        3. Click Rescan
        4. See error
    validations:
      required: true
  - type: input
    id: vapor_version
    attributes:
      label: Vapor version
      placeholder: 1.4.8
    validations:
      required: true
  - type: input
    id: windows_version
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or error messages
      description: Paste anything helpful.
      render: shell
